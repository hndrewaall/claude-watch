# Fresh-laptop developer stack — wires claude-container + queue-minisite +
# eichi search-minisite into a single `docker compose up`.
#
# Prerequisites + setup walkthrough live in the sibling README.md. Short
# version: clone claude-watch and eichi as siblings, then run
# `docker compose up` from this directory.
#
# Sibling-repo layout assumed by the build contexts below:
#
#   <root>/
#     claude-watch/        (this repo)
#       container/         (claude-container source, this-repo subdir)
#       examples/compose/  (this file)
#     eichi/               (https://github.com/hndrewaall/eichi)
#
# In-container paths hardcode the `hndrewaall` user because that is the
# UID-1000 user baked into the claude-container and eichi search-minisite
# Dockerfiles. The HOST user can be anything — bind-mounts use `${HOME}`
# on the left side so the right (container) side is the only place the
# username matters. README "Caveats" elaborates.

services:
  # ---------------------------------------------------------------------
  # tmux-socket-init — one-shot bootstrap that chowns the shared tmux
  # socket dir to uid 1000 mode 0700 before claude-container or ttyd
  # mount it. Necessary because Docker Desktop (macOS, Windows) does
  # NOT copy image-side directory perms into a fresh named volume the
  # way native Linux Docker does, so the volume otherwise comes up
  # root-owned and tmux refuses to bind its socket as a non-owner.
  #
  # Linux: harmless no-op (perms already correct from the claude-
  # container image's pre-created dir).
  # ---------------------------------------------------------------------
  tmux-socket-init:
    image: alpine:3.20
    command: >-
      sh -c "chown 1000:1000 /tmp/tmux-1000 && chmod 0700 /tmp/tmux-1000 && echo 'tmux-socket-init: chowned 1000:1000 0700'"
    volumes:
      - "claude-tmux-socket:/tmp/tmux-1000"
    restart: "no"

  # ---------------------------------------------------------------------
  # claude-container — Claude Code + claude-watch + tmux in one image.
  #
  # In-repo build context: container/ lives at the repo root (absorbed
  # from the now-merged claude-container sibling repo).
  # ---------------------------------------------------------------------
  claude-container:
    build:
      # Build context is the claude-watch repo root so the Dockerfile
      # can COPY from sibling tools/hooks/ (the canonical home of the
      # obligations gate hook scripts that bake into /usr/local/bin/).
      # Same shape as the queue-minisite service below.
      context: ../..
      dockerfile: container/Dockerfile
    image: claude-container:dev
    # Give PID 1 (process-compose) room to run its own graceful
    # shutdown before docker SIGKILLs it. process-compose signals each
    # supervised process and waits up to that process's
    # `shutdown.timeout` (pinned to 3s each in
    # container/process-compose.yml) before escalating to SIGKILL.
    # Worst case is the processes torn down sequentially, so 15s is
    # comfortable headroom. A grace period SHORTER than
    # process-compose's total shutdown (the prior 5s) let docker
    # SIGKILL PID 1 mid-teardown, orphaning cron / claude-watch
    # grandchildren that kept the shared named volumes + tmux socket
    # pinned — which is what wedged `up --force-recreate` (a full
    # `down` tears the netns down so it papered over the leak).
    stop_grace_period: 15s
    depends_on:
      tmux-socket-init:
        condition: service_completed_successfully
    extra_hosts:
      # Required so the in-container claude binary can dial the host's
      # VSCode SSE listener via CLAUDE_CODE_IDE_HOST_OVERRIDE.
      - "host.docker.internal:host-gateway"
    environment:
      CLAUDE_CODE_IDE_HOST_OVERRIDE: host.docker.internal
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Forwarded if set on the host (VSCode IDE port).
      CLAUDE_CODE_SSE_PORT: ${CLAUDE_CODE_SSE_PORT:-}
      # Corporate-network passthrough: SSL CA bundles + proxy settings for
      # operators on enterprise VPNs (Salesforce, etc.) where the host
      # injects a corp CA into NODE_EXTRA_CA_CERTS / SSL_CERT_FILE etc.
      # Without this, the in-container claude binary fails with
      # "Unable to connect to API: SSL certificate verification failed.
      # Check your proxy or corporate SSL certificates" against any
      # TLS endpoint behind the corp MITM proxy. Note: forwarding the
      # env var alone isn't enough — the CA file path also has to resolve
      # inside the container. See the CLAUDE_HOST_CORP_CA_BUNDLE mount
      # below for the bind-mount side of the fix.
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      SSL_CERT_FILE: ${SSL_CERT_FILE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      CURL_CA_BUNDLE: ${CURL_CA_BUNDLE:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      https_proxy: ${https_proxy:-}
      http_proxy: ${http_proxy:-}
      no_proxy: ${no_proxy:-}
      # Cross-arch hook auto-rewrite. When "1", the entrypoint generates
      # a container-local copy of settings.json wrapping every hook
      # command in /usr/local/bin/exec-hook, so non-Linux host binaries
      # silently no-op instead of spamming "Exec format error" on every
      # hook event. Off by default; Mac-host operators enable it via .env.
      CLAUDE_CONTAINER_REWRITE_HOOKS: ${CLAUDE_CONTAINER_REWRITE_HOOKS:-}
      # CLAUDE_CONTAINER_OBLIGATIONS — wire the canonical obligations
      # gate hooks (pre-agent-queue-gate, pre-tool-obligations-gate,
      # post-tool-obligations-update, post-tool-mark-attachment-read)
      # into the in-container claude. Default-on (the entrypoint
      # treats unset / "" as 1). Set to "0" to disable for a "raw"
      # Claude Code sandbox container without the host-side guardrails.
      # The hooks resolve `obligations` from PATH, so the
      # bind-mounted ~/repos/claude-watch/tools/obligations CLI is the
      # live source; missing CLI → default-open per the hook fail-safe.
      CLAUDE_CONTAINER_OBLIGATIONS: ${CLAUDE_CONTAINER_OBLIGATIONS:-1}
      # Operator-tunable glob list that narrows which commands the
      # rewrite touches. Colon-separated globs; first whitespace-
      # separated token of each command is matched against each glob.
      # Unset / empty (default) = wrap everything (backward compatible).
      # Example: '/Users/*/.devbar/bin/*:/Users/*/.devbar/pkgs/*/bin/*'.
      # Honored by both generate-hooks-shim-settings (hooks) and
      # generate-project-mcp-json (MCP server commands).
      CLAUDE_SHIM_PATTERNS: ${CLAUDE_SHIM_PATTERNS:-}
      # CLAUDE_MCP_HTTP_BRIDGE — operator-tunable map of MCP server
      # names to host-side HTTP endpoint URLs. Colon-separated
      # `name=url` pairs. When an entry's name matches a server in
      # ~/.claude.json mcpServers, the in-container .mcp.json is
      # rewritten from stdio shape (`command: ...`) to Claude Code's
      # native HTTP MCP transport (`type: "http"`, `url: <url>`), so
      # the in-container claude dials the operator-provided host
      # adapter instead of trying to exec a cross-arch (macOS Mach-O)
      # binary. Pair with a host-side stdio→HTTP wrapper (mcp-proxy
      # etc.) that owns the actual MCP binary. Unset / empty = no
      # rewriting (default). Example:
      #   mcp-adaptor=http://host.docker.internal:8765/mcp
      CLAUDE_MCP_HTTP_BRIDGE: ${CLAUDE_MCP_HTTP_BRIDGE:-}
      # CLAUDE_HOST_HOOK_BRIDGE — when "1", exec-hook hands every Mach-O
      # / wrong-arch hook off to /usr/local/bin/exec-hook-bridge instead
      # of silently no-op'ing. The bridge marshals the call across the
      # host-bash MCP server (default endpoint
      # http://host.docker.internal:8766/mcp, overridable via
      # CLAUDE_HOST_HOOK_BRIDGE_URL) so the REAL host binary runs and
      # its exit code propagates back into the in-container claude
      # session. Bridge failures fall back to the legacy silent-no-op
      # contract. Operator must also add the hook binary basename to
      # mcp-host-bash's allow-list via CLAUDE_HOOK_BRIDGE_BINS on the
      # HOST shell that launches mcp-host-bash. Default off.
      CLAUDE_HOST_HOOK_BRIDGE: ${CLAUDE_HOST_HOOK_BRIDGE:-}
      CLAUDE_HOST_HOOK_BRIDGE_URL: ${CLAUDE_HOST_HOOK_BRIDGE_URL:-}
      CLAUDE_HOST_HOOK_BRIDGE_TIMEOUT: ${CLAUDE_HOST_HOOK_BRIDGE_TIMEOUT:-}
      CLAUDE_HOST_HOOK_BRIDGE_DEBUG: ${CLAUDE_HOST_HOOK_BRIDGE_DEBUG:-}
      CLAUDE_HOST_HOOK_BRIDGE_FORWARD_ENV: ${CLAUDE_HOST_HOOK_BRIDGE_FORWARD_ENV:-}
      # CLAUDE_HOST_HOOK_BRIDGE_BEARER — shared-secret bearer token
      # the bridge sends as `Authorization: Bearer <token>` on every
      # POST. Must match MCP_HOST_BASH_BEARER on the host launcher
      # side (see examples/compose/.env.example). Empty / unset =
      # no Authorization header sent. Required when the host launcher
      # is running behind mcp-proxy-auth-shim.
      CLAUDE_HOST_HOOK_BRIDGE_BEARER: ${CLAUDE_HOST_HOOK_BRIDGE_BEARER:-}
      # Host-project-dir signal — read by the entrypoint's
      # trust-workspace pre-seed so the workspace at the bind-mounted
      # host project path is pre-trusted (skips the first-launch dialog).
      CLAUDE_HOST_PROJECT_DIR: ${CLAUDE_HOST_PROJECT_DIR:-}
      # CLAUDE_AUTO_CONTINUE — when non-empty, the entrypoint appends
      # `--continue "$value"` to the in-container claude invocation so
      # the prior conversation auto-resumes with the value as the seed
      # prompt. Matches the host alias shape `claude --continue resume`.
      # Pair with CLAUDE_HOST_PROJECT_DIR to anchor the cwd-derived
      # project-memory key to the host path; the resume picks up the
      # conversation tied to that cwd. Default unset = bare claude.
      CLAUDE_AUTO_CONTINUE: ${CLAUDE_AUTO_CONTINUE:-}
      # Skip all permission prompts. Set to "1" in .env for sandboxed
      # containers with no internet risk. The entrypoint appends
      # --dangerously-skip-permissions to the claude argv when set.
      CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS: ${CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS:-}
      # CLAUDE_EVENT_QUEUE — in-container override for where the
      # claude-event-tail watcher looks for event JSON files (and
      # where the in-container claude-event CLI writes to). Wired to
      # the same operator-supplied path as the bind-mount source/dest
      # below, so the host writer and the in-container reader hit the
      # SAME absolute directory regardless of what each side calls
      # $HOME. Empty / unset = the in-container watcher falls through
      # to its default of $HOME/claude-events (= /home/hndrewaall/
      # claude-events inside the container), preserving the legacy
      # shape for operators who don't bridge the host spool.
      CLAUDE_EVENT_QUEUE: ${CLAUDE_HOST_EVENTS_DIR:-}
    volumes:
      # Host $HOME -> in-container /home/hndrewaall. The right-hand side
      # is fixed: the container's UID-1000 user is named `hndrewaall` in
      # the Dockerfile, regardless of what your host user is called.
      #
      # Phase-2 host-state surface: bind-mount the high-leverage subset of
      # the operator's host state so the in-container claude / claude-watch
      # boot with real config instead of vanilla defaults. See README
      # "Host state bind-mounts" for the rw/ro rationale + the graceful
      # no-op behavior when these paths are absent on the host (typical
      # on a fresh macOS workbot).
      #
      # Every Phase-2 mount source is overridable via a CLAUDE_HOST_*
      # env var. Defaults below resolve to the standard ${HOME}-rooted
      # Linux paths. macOS users (whose Claude Code managed-settings live
      # at a different system path, or who keep operator tooling outside
      # ${HOME}/bin etc.) can set the overrides in .env without editing
      # this file. See README "Host paths on non-default layouts" and
      # .env.example for the full per-tier table.
      #
      # The mount set covers three of the four Claude Code settings tiers
      # documented at https://code.claude.com/docs/en/settings
      # (precedence, highest priority first):
      #
      #   1. Managed / enterprise — CLAUDE_HOST_MANAGED_SETTINGS_DIR.
      #      Linux default /etc/claude-code/, macOS default
      #      /Library/Application Support/ClaudeCode/. Mounted ro into
      #      the container's /etc/claude-code/ so the in-container claude
      #      reads the host's managed policy.
      #   2. (CLI args — not a mount; supplied at invocation time.)
      #   3. Project-local / project — comes for free via the
      #      ${CLAUDE_HOST_REPOS_DIR:-${HOME}/repos} mount (each repo's
      #      .claude/ is part of the tree).
      #   4. User-global ~/.claude/ — CLAUDE_HOST_CONFIG_DIR (defaults
      #      to ${HOME}/.claude); plus the user-global top-level config
      #      file ~/.claude.json — CLAUDE_HOST_CONFIG_FILE (defaults to
      #      ${HOME}/.claude.json).
      #
      # Managed-settings dir — ro: the in-container claude resolves
      # /etc/claude-code/managed-settings.json (its Linux managed-config
      # path) so host-level MDM / enterprise policy applied on the host
      # carries into the container. Set CLAUDE_HOST_MANAGED_SETTINGS_DIR
      # to your host's managed-settings dir to opt in (Linux default
      # /etc/claude-code/, macOS default /Library/Application Support/
      # ClaudeCode/; no escaping needed when set via .env).
      #
      # Default is /dev/null so the image-baked /etc/claude-code/CLAUDE.md
      # (the managed-policy CLAUDE.md describing the container runtime,
      # shipped via the Dockerfile) is NOT shadowed for operators who
      # don't have a host managed-settings dir. Previously this defaulted
      # to /etc/claude-code which silently shadowed the baked file when
      # the host happened to have an empty /etc/claude-code directory or
      # when docker auto-created the source path on first up. Operators
      # who DO want host managed policy in the container set the env
      # var explicitly; the override replaces the baked dir wholesale.
      - "${CLAUDE_HOST_MANAGED_SETTINGS_DIR:-/dev/null}:${CLAUDE_HOST_MANAGED_SETTINGS_DIR:-/dev/null}:ro"
      # ~/.claude — rw: Claude Code writes session JSONLs, project state,
      # cache, telemetry here on every interaction. Also the location of
      # agent definition files (~/.claude/agents/*.md) the in-container
      # claude needs to dispatch sub-agents.
      - "${CLAUDE_HOST_CONFIG_DIR:-${HOME}/.claude}:/home/hndrewaall/.claude:rw"
      # ~/.claude.json — rw: top-level Claude Code config (MCP server
      # registry, model preferences, project allow-lists). Claude updates
      # this on settings changes.
      - "${CLAUDE_HOST_CONFIG_FILE:-${HOME}/.claude.json}:/home/hndrewaall/.claude.json:rw"
      # ~/repos — rw: host repo trees so in-container scripts under
      # ~/bin (next mount) can resolve their symlink targets. Read-write
      # because the in-container claude is the operator's daily-driver
      # editor — they expect to land in a repo, edit, commit, and push
      # exactly like a native shell session. The previous "confine edits
      # to /workspace or explicit clones" framing reflected an earlier
      # phase when the container was a sandbox; once the container is the
      # primary editor (q-2026-05-14-7aaa), forcing the operator to detour
      # through /workspace breaks every routine git workflow.
      - "${CLAUDE_HOST_REPOS_DIR:-${HOME}/repos}:/home/hndrewaall/repos:rw"
      # ~/bin — rw: host launcher / shim scripts (mostly symlinks into
      # ~/repos/*/bin). Lets the in-container claude-watch shell out to
      # the same tools the host operator runs. Read-write so the operator
      # can `ln -s` a new shim from inside the container without dropping
      # to a host shell — symmetric with the ~/repos mount above. Most
      # entries here are symlinks pointing into ~/repos/*/bin/, which
      # require ~/repos to be writable for any actual content edit; this
      # mount being RW lets the operator add / remove the symlink itself
      # in the same workflow.
      - "${CLAUDE_HOST_BIN_DIR:-${HOME}/bin}:/home/hndrewaall/bin:rw"
      # claude-event spool — rw. Host cron / alertmanager / queue
      # producers write here; the in-container claude-event-tail reads
      # + consumes them. Same-path-on-both-sides mirror so the spool
      # resolves to the SAME absolute path inside and out — the
      # in-container claude-event-tail picks the path up via the
      # CLAUDE_EVENT_QUEUE env var (set in the environment: block
      # above from the same CLAUDE_HOST_EVENTS_DIR value), so the host
      # writer and container reader hit the same directory regardless
      # of what each side calls $HOME.
      #
      # Why mirror (and not the legacy ${HOME}/claude-events → fixed
      # /home/hndrewaall/claude-events shape): when the operator
      # invokes `sudo docker compose up`, Compose resolves ${HOME} to
      # /root, so the legacy default silently bridged to
      # /root/claude-events on the host — not the operator's actual
      # spool. The mirror pattern eliminates the ${HOME}-resolution
      # foot-gun: the operator sets CLAUDE_HOST_EVENTS_DIR explicitly
      # and both sides of the bind-mount + the in-container env var
      # all use the same literal path.
      #
      # Default /dev/null (graceful no-op) when CLAUDE_HOST_EVENTS_DIR
      # is unset — matches the CLAUDE_HOST_HOOKS_DIR / project-dir /
      # managed-settings patterns above. Operators who want claude-
      # event bridging set the env var in their .env file or
      # docker-compose.override.yml; unset operators get a stripped-
      # down container with no host claude-event integration.
      - "${CLAUDE_HOST_EVENTS_DIR:-/dev/null}:${CLAUDE_HOST_EVENTS_DIR:-/dev/null}:rw"
      # Operator-specific host paths (gh CLI token, gitconfig, ssh-agent
      # socket, work-private bare-repo paths, etc.) are intentionally
      # NOT wired here. Drop them in a local
      # `docker-compose.override.yml` (gitignored) — see
      # `docker-compose.override.yml.example` for the canonical shape.
      # The in-container `/claude-container:edit-host-mounts` skill can
      # generate / update that override file for you by probing the
      # host via `host-bash` and writing the detected mounts.
      # Host-specific integration mounts (shell-history DB, messaging
      # client attachment dirs, etc.) are intentionally NOT wired here.
      # Add them in a local `docker-compose.override.yml` if your
      # operator setup needs them — the public example stays
      # integration-agnostic.
      # Host ~/.config/session/queue.json — rw so session-task adds/removes
      # from inside claude-container flow to the SAME host file the
      # queue-minisite reads (it bind-mounts the same host path into its
      # own /queue-home/.config/session). Without this, in-container
      # session-task writes go to /home/hndrewaall/.config/session inside
      # the container's own filesystem, which is invisible to the minisite.
      - "${HOME}/.config/session:/home/hndrewaall/.config/session:rw"
      # Corporate SSL CA bundle — ro. Forwarded NODE_EXTRA_CA_CERTS /
      # SSL_CERT_FILE / etc. env vars carry an ABSOLUTE host path that
      # has to resolve inside the container; we bind-mount the host file
      # at the SAME path to make the chain validate. The default
      # `/dev/null` source is a graceful no-op when the operator isn't on
      # a corp VPN — it bind-mounts a real (but empty) device which
      # OpenSSL / Node treat as "no extra CA", no errors. macOS operators
      # on enterprise VPNs typically set this to whatever
      # NODE_EXTRA_CA_CERTS already points at on their laptop (e.g.
      # /Users/<you>/.config/corp/corp-ca.pem).
      - "${CLAUDE_HOST_CORP_CA_BUNDLE:-/dev/null}:${CLAUDE_HOST_CORP_CA_BUNDLE:-/dev/null}:ro"
      # Host hook-script dir — ro. When ~/.claude/settings.json references
      # a hook script by ABSOLUTE host path (corp telemetry hooks,
      # auto-installed via tools like devbar), the path has to resolve
      # inside the container or Claude Code logs "SessionStart:startup
      # hook error — /bin/sh: 1: <path>: not found" and refuses to fire
      # the hook. Bind-mount the host dir at the SAME path so the
      # settings.json reference Just Works. Defaults to /dev/null
      # (graceful no-op) for operators without host-resident hooks.
      - "${CLAUDE_HOST_HOOKS_DIR:-/dev/null}:${CLAUDE_HOST_HOOKS_DIR:-/dev/null}:ro"
      # Host project dir — rw. When CLAUDE_HOST_PROJECT_DIR is set, the
      # host path is bind-mounted at the SAME absolute path inside the
      # container so Claude Code's cwd-derived project-memory key
      # (~/.claude/projects/<urlencoded-cwd>/) matches the host path
      # rather than /workspace. Pair with `working_dir:
      # ${CLAUDE_HOST_PROJECT_DIR}` below for the cwd flip. Defaults to
      # /dev/null (graceful no-op) so unconfigured deployments keep the
      # /workspace default.
      - "${CLAUDE_HOST_PROJECT_DIR:-/dev/null}:${CLAUDE_HOST_PROJECT_DIR:-/dev/null}:rw"
      # Persists the in-container claude binary's auto-updates across
      # `--rm` restarts so you don't reset to the image-baked version
      # every time the container exits.
      - "claude-container-versions:/home/hndrewaall/.local/share/claude"
      # Shares the in-container tmux socket dir with the sibling ttyd
      # service so the browser console can attach to the same session
      # as `docker compose exec claude-container tmux attach`. The
      # entrypoint creates the session on the default socket as uid
      # 1000, which lives at /tmp/tmux-1000/default inside the
      # container.
      - "claude-tmux-socket:/tmp/tmux-1000"
      # claude-watch state dir — holds active-agents.json (published
      # every minute by the in-container cron) and any other daemon
      # state. Shared read-only with queue-minisite via the named
      # volume below so the minisite's live-log modal can resolve the
      # JSONL transcript path for each running agent.
      #
      # Override with CW_STATE_PATH=/absolute/host/path to swap the
      # named volume for a host bind-mount (useful when the host has
      # claude-watch installed natively and you want the minisite to
      # read the same file). Set the env var in .env or export before
      # running docker compose up.
      - "${CW_STATE_PATH:-claude-watch-state}:/var/lib/claude-watch"
    # working_dir flip: when CLAUDE_HOST_PROJECT_DIR is set, override the
    # image WORKDIR (/workspace) with the host path so the in-container
    # claude lands at the project-memory-matching cwd. Empty / unset
    # falls back to the image default. Compose interpolation requires a
    # default value for the conditional, so we leave the var verbatim
    # and let docker resolve "" -> empty working-dir flag (which Docker
    # treats as the image default).
    working_dir: ${CLAUDE_HOST_PROJECT_DIR:-/workspace}
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------
  # queue-minisite — Flask UI for the session-task work queue.
  #
  # Build context is the claude-watch repo root so the Dockerfile can
  # COPY from sibling tools/. The host-side session-task script is
  # bind-mounted read-only at /app/session-task so the container always
  # runs the upstream version without rebuilding on every PR.
  # ---------------------------------------------------------------------
  queue-minisite:
    build:
      context: ../..
      dockerfile: queue-minisite/Dockerfile
    image: queue-minisite:dev
    ports:
      - "8000:8000"
    user: "1000:1000"
    environment:
      # HOME drives where the vendored session-task / claude-event /
      # obligations CLIs read + write — they all use Path.home().
      HOME: /queue-home
      QUEUE_JSON: /queue-home/.config/session/queue.json
      AGENTS_JSONL_ROOT: /agents-jsonl
      CACHE_TTL_SECONDS: "5"
      # Silence pingme + claude-event chatter from the Stop button path
      # (the UI itself is the acknowledgment). Set to 0 to re-enable
      # for users who have a pingme shim wired in via override.
      PINGME_SESSION_TASK: "1"
      CLAUDE_EVENT_SESSION_TASK: "1"
      # Agent-liveness state — written every minute by the in-container
      # claude-watch active-agents cron. Shared from claude-container via
      # the claude-watch-state named volume (or CW_STATE_PATH bind-mount).
      # Required for the live-log modal to locate the running agent's JSONL
      # transcript and for the "alive" badge on running items.
      AGENT_STATE_JSON: /agents-state/active-agents.json
      # Persistent archive dir for completed-agent transcripts. session-task
      # copies the JSONL here at queue-done / queue-abandon time; the minisite
      # reads it back for the "View log" button on done / abandoned items.
      QUEUE_LOG_ARCHIVE_DIR: /queue-home/.config/session/queue-logs
    volumes:
      # session-task queue.json — rw because the Stop button mutates it
      # via session-task (atomic tmp+rename + flock).
      - "${HOME}/.config/session:/queue-home/.config/session:rw"
      # ~/claude-events/ — rw so queue-abandoned events land where the
      # host's claude-event-watch picks them up.
      - "${HOME}/claude-events:/queue-home/claude-events:rw"
      # Per-session agent JSONL transcripts — the SSE live-log endpoint
      # tails these.
      - "${HOME}/.claude/projects:/agents-jsonl:ro"
      # claude-watch state dir — shared with claude-container via the named
      # volume so this container can read active-agents.json (owner liveness
      # + JSONL path per running queue item). The volume reference matches
      # the claude-container mount above; both containers see the same bytes.
      - "${CW_STATE_PATH:-claude-watch-state}:/agents-state:ro"
      # Host obligations.json — rw because the Force-start button
      # registers a hard-gate row that the host main loop reads.
      - "${HOME}/.config/claude:/queue-home/.config/claude:rw"
      # Canonical session-task script — bind-mounted read-only so the
      # container always runs the upstream version. Path is relative to
      # the build context (claude-watch repo root).
      - "../../tools/session-task/session-task:/app/session-task:ro"
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # eichi-search — Flask UI for the eichi local semantic-search CLI.
  #
  # Sibling-repo build context. The eichi venv (heavy ML deps) is
  # bind-mounted from the host into the container at the SAME path so
  # the venv's editable .pth (which uses an absolute path) keeps
  # resolving. This means the host's eichi clone MUST live at
  # ${HOME}/repos/eichi — see README "Sibling-repo layout".
  #
  # After first launch you'll want to populate the index DB. See
  # README "First-run indexing" — the empty container will serve a
  # working UI but return zero results until you've indexed something.
  # ---------------------------------------------------------------------
  eichi-search:
    build:
      context: ../../../eichi
      dockerfile: minisite/Dockerfile
    image: eichi-search:dev
    ports:
      - "8001:8000"
    user: "1000:1000"
    environment:
      EICHI_DB: /home/hndrewaall/.local/share/eichi/index.db
      # EICHI_PYTHON deliberately unset — app.py defaults to the
      # container's own sys.executable. The host venv contains macOS
      # Mach-O binaries that cannot exec in the Linux container.
    volumes:
      # Host eichi repo (source tree) — used by eichi_worker.py's
      # sources.py import for config resolution. Read-only.
      - "${HOME}/repos/eichi:/home/hndrewaall/repos/eichi:ro"
      # Host ~/.config/eichi — read-only. The container reads
      # sources.toml from this path (see src/eichi/sources.py); the
      # public minisite is service-agnostic and renders the source-map
      # the operator supplies on the host. Read-only because the
      # operator's local config shouldn't be mutated by the container.
      - "${HOME}/.config/eichi:/home/hndrewaall/.config/eichi:ro"
      # Index DB. Read-write because eichi.store.open_db unconditionally
      # runs CREATE TABLE IF NOT EXISTS on connect. Actual writes are
      # limited to SQLite journal/WAL housekeeping.
      - "${HOME}/.local/share/eichi:/home/hndrewaall/.local/share/eichi:rw"
      # HuggingFace model cache — first query needs the embedding model
      # (~400 MB). Pre-warmed by `eichi index` on the host before first
      # launch; otherwise the container tries to download on cold start.
      - "${HOME}/.cache/huggingface:/home/hndrewaall/.cache/huggingface:ro"
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # ttyd — browser-based terminal that drops into the claude-container's
  # tmux session. Same view as `docker compose exec claude-container
  # tmux attach`, accessible at http://localhost:7681.
  #
  # Wiring: both services run as uid 1000 and share the named volume
  # `claude-tmux-socket` mounted at /tmp/tmux-1000 (the tmux default
  # socket dir for uid 1000). claude-container's entrypoint creates the
  # session before ttyd would have anything to attach to, so a manual
  # `depends_on` keeps the cold-start ordering sane — but ttyd uses
  # `tmux new-session -A` which attaches if the session exists and
  # creates it otherwise, so it's resilient to startup races and
  # reconnects.
  #
  # Security note: published on localhost:7681 unauthenticated by
  # design for local development. Do NOT expose publicly without an
  # auth proxy (oauth2-proxy, basic-auth nginx, Cloudflare Access,
  # etc.). `--writable` means anyone reaching the port has full shell
  # access to the in-container tmux session — which, by extension,
  # has read access to the bind-mounted ~/.claude and ~/repos.
  # ---------------------------------------------------------------------
  ttyd:
    build:
      context: ./ttyd
      dockerfile: Dockerfile
    image: claude-ttyd:dev
    ports:
      - "7681:7681"
    user: "1000:1000"
    depends_on:
      tmux-socket-init:
        condition: service_completed_successfully
      claude-container:
        condition: service_started
    environment:
      # UTF-8 locale: tmux downgrades non-ASCII output to literal
      # underscores when the client locale is C. The bookworm-based
      # ttyd image (see ttyd/Dockerfile) ships glibc but not by-default
      # generated locales, so LANG/LC_ALL alone isn't enough — we also
      # pass `-u` to tmux in the command list below to force UTF-8
      # regardless of the locale environment.
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    volumes:
      - "claude-tmux-socket:/tmp/tmux-1000"
    # Single-quoted YAML strings preserve embedded double-quotes
    # verbatim, which keeps the xterm.js `theme` JSON valid. ttyd's
    # `-t key=value` flag sets xterm.js client options; `--` separates
    # ttyd args from the command it runs (tmux with `-u` for UTF-8 +
    # `-S` for the shared socket).
    command:
      # `-I /usr/local/share/ttyd/index.html` serves the autodark-patched
      # HTML built into the image (ttyd/Dockerfile html-builder stage),
      # which adds @media (prefers-color-scheme) page-chrome CSS plus a
      # runtime xterm.js theme swap so macOS Safari / dark-mode users
      # don't see a white frame around the dark terminal. The injected
      # script also restamps the theme on a setInterval poll to defend
      # against ttyd's post-connect SET_PREFERENCES overwrite (full
      # race comment in inject-autodark.py).
      - ttyd
      - --writable
      - -I
      - /usr/local/share/ttyd/index.html
      - -t
      - 'theme={"background":"#002b36","foreground":"#93a1a1","cursor":"#93a1a1","cursorAccent":"#002b36","selectionBackground":"#073642","selectionForeground":"#eee8d5","selectionInactiveBackground":"#073642","black":"#073642","red":"#dc322f","green":"#859900","yellow":"#b58900","blue":"#268bd2","magenta":"#d33682","cyan":"#2aa198","white":"#eee8d5","brightBlack":"#002b36","brightRed":"#cb4b16","brightGreen":"#586e75","brightYellow":"#657b83","brightBlue":"#839496","brightMagenta":"#6c71c4","brightCyan":"#93a1a1","brightWhite":"#fdf6e3"}'
      - -t
      - 'fontFamily=Menlo,monospace'
      - -t
      - 'fontSize=14'
      - --
      - tmux
      - -u
      - -S
      - /tmp/tmux-1000/default
      - new-session
      - -A
      - -s
      - claude-container
    restart: unless-stopped

volumes:
  # In-container claude binary's auto-updated versions/ tree. First
  # launch the volume is empty and the container falls through to the
  # image-baked claude. Subsequent self-updates persist here.
  claude-container-versions:
  # Shares the in-container tmux socket dir between claude-container
  # and the sibling ttyd service so the browser console can attach to
  # the same tmux session that `docker compose exec claude-container
  # tmux attach` would land you in.
  claude-tmux-socket:
  # claude-watch state dir — shared between claude-container (writer)
  # and queue-minisite (reader). Holds active-agents.json (the per-minute
  # JSON state file published by the in-container claude-watch cron) and
  # any other daemon state that needs to survive container recreate.
  #
  # Only declared — and only used — when CW_STATE_PATH is unset. When
  # CW_STATE_PATH=/absolute/host/path is set (e.g. pointing at a
  # native claude-watch state dir on Linux), Compose treats the env var
  # as an absolute path and creates a host bind-mount instead; this
  # named volume is left declared but unused.
  #
  # Nuke: docker volume rm <project>_claude-watch-state
  claude-watch-state:
