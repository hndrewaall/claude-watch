# claude-watch configuration
# Default location: ~/.config/claude-watch/config.toml

[general]
# Main check interval in seconds
check_interval = 10
# Path to persist state across restarts
state_file = "~/.config/claude-watch/state.json"
# Structured log output (JSON lines)
log_file = "/var/log/claude/claude-watch.jsonl"
# Also log to the legacy plain-text log for backwards compat
legacy_log_file = "/var/log/claude/claude-watch.log"
# Global post-interrupt cooldown (seconds). After ANY interrupt fires
# (prolonged-thinking, watcher-down, context-warning), suppress all new
# interrupts for this many seconds. Prevents cascading interrupts where a
# watcher-down interrupt fires mid-thought, resets the thinking timer, and
# then prolonged-thinking immediately re-fires on the newly-started thought.
# 0 disables the gate. Raised 60 -> 300 (2026-06-11): 5-min global
# interrupt ceiling. Per-type cooldowns are the inner lower-bound; this
# is the outer ceiling — a fire needs BOTH its per-type elapsed AND the
# global claim to succeed. User-overridable.
post_interrupt_cooldown_secs = 300
# Keep watcher-down EXEMPT from the global ceiling (a down watcher is a
# hard-liveness escape hatch). Set false to gate watcher-down too.
global_cooldown_exempt_watcher_down = true

[tmux]
# Override: pin Claude Code to a specific tmux pane (e.g. "dashboard:0.2").
# Leave empty or omit to auto-detect via find_claude_pane().
dashboard_pane = "dashboard:0.2"
# Override: tmux session name where Claude Code runs (e.g. "dashboard").
# Leave empty or omit to auto-detect across all sessions.
dashboard_session = "dashboard"
# Settle delay (milliseconds) inserted between the ESC -> NORMAL-mode
# transition and the dd/i/text sequence inside inject_text. Default: 0
# (disabled — fast path). Tune up only if a particular environment shows
# follow-up keystrokes (typed prompt text, vim-mode dd/i, /clear, resume,
# etc.) being garbled or eaten because Claude Code's pane hasn't finished
# processing the Escape before the next keys arrive. Most setups don't
# need this — the ESC loop's per-iteration is_insert_mode() check already
# confirms each Escape was processed before the next is sent (and PR #46
# adds explicit INSERT-mode verification after `i`).
post_escape_settle_ms = 0

[claude]
# Max context window tokens
max_context_tokens = 1000000
# Heartbeat file written by memory-remind
heartbeat_file = "/var/run/claude/heartbeat"
# Relaunch script path (written on restart)
relaunch_script = "/var/run/claude/claude-relaunch.sh"

[dead_process]
# Consecutive zero-token checks before declaring dead
checks_required = 3
# Cooldown between restart attempts (seconds)
restart_cooldown = 300
# After this many dead checks with idle prompt (no shell), inject "resume"
# for externally-launched sessions (e.g. dashboard --fresh)
fresh_inject_checks = 5

[fresh_clear]
# Token range for detecting a fresh /clear
min_tokens = 2000
max_tokens = 5000
# Consecutive detections required before acting
detections_required = 2
# Cooldown between fast-path alerts (seconds)
cooldown = 120

[heartbeat]
# Minutes before heartbeat is considered stale.
# This is the SOLE stuck-state indicator: if memory-remind can't touch the
# heartbeat file for this many minutes, Claude Code is definitively stuck.
stale_minutes = 10

[alerts]
# Initial cooldown between heartbeat-path alerts (seconds)
initial_cooldown = 600
# Escalation tiers: [cooldown_seconds, ...]
# After initial_cooldown fires twice, escalate
escalation_tiers = [600, 600, 1800, 3600, 3600, 3600]
# Stop push notifications (pingme) after this many alerts
max_pingme_alerts = 6
# Resume prompt injected into Claude Code
resume_prompt = "[CLAUDE-WATCH] Daemon detected stuck state: no background tasks running and not thinking. Please run the cleanup skill (/cleanup) to restart all watchers. If this alert fired incorrectly, DM Andrew with the details."
# Prompt injected on the heartbeat-stale path specifically. The heartbeat
# file is a liveness signal the main loop touches on each heartbeat-tick;
# when it goes stale the recovery action is to TOUCH the file (restore
# liveness), not run a generic /cleanup. Plain-text directive — the loop
# reads it and emits its own well-formed `touch` tool call (injecting raw
# tool-call tags as pane text would render as prose and be silently dropped).
heartbeat_stale_prompt = "[CLAUDE-WATCH] The host heartbeat file went stale — you are not touching /var/run/claude/heartbeat. Immediately run `touch /var/run/claude/heartbeat` as a single well-formed Bash tool call to restore liveness, then check why the heartbeat-tick events weren't handled (watcher-ctl status; is claude-event-watch up?). If this fired incorrectly, DM Andrew with the details."

[foreground_monitor]
# Enable foreground blocking pattern detection
enabled = true
# Seconds of continuous foreground activity before warning.
# Raised 180 -> 300 on 2026-04-21: the shorter value was firing on legitimate
# long agent-return reads. 300s still catches real stuck states.
# Raised 300 -> 480 on 2026-05-30 (Andrew): prolonged-thinking alerts were
# self-feeding the watcher treadmill (every 5min thinking = a claude-event =
# claude-event-watch wake/exit = DOWN window = gate trip). 8min cuts the spam.
threshold_seconds = 480
# Check interval for foreground state (seconds) — independent of general.check_interval
check_interval = 3
# Interrupt when blocking/prolonged thinking detected (false = log-only mode)
interrupt_enabled = true
# Message injected after interrupting
interrupt_message = "The foreground command was backgrounded by claude-watch because it exceeded the timeout. Use run_in_background for long commands."
# Multiplier applied to threshold_seconds on each successive interrupt.
# With threshold_seconds=300 and multiplier=3 the sequence is 300, 900,
# 2700 (capped at max_thinking_backoff). Raised 2 -> 3 on 2026-04-21:
# if interrupt #1 didn't break the wedge, firing #2 quickly won't either.
thinking_backoff_multiplier = 3
# Token-progress guard (v2 sliding re-arm, 2026-06-11): Claude Code
# 2.1.17x keeps the assistant turn open — live thinking widget rendered —
# while background shells are pending, so the pane scrape reads continuous
# "Thinking" through pure idle waits and fires false prolonged-thinking
# interrupts. On every ongoing-thinking check, token growth >= this floor
# since the episode baseline re-arms the thinking timer (timer + baseline
# slide forward to now), so the timer only accumulates over genuinely
# growth-free time and the interrupt fires only after threshold_seconds
# of Thinking WITHOUT token progress — a parked/wedged turn. The count
# measures CONTEXT tokens: tool results and injected system reminders
# grow it (~3-7k per 480s observed) even when the assistant emits almost
# nothing, which keeps an idle-but-alive open turn re-arming forever —
# that same ambient growth is what defeated the v1 at-fire-time delta
# check (delta was always >= the floor, so it never suppressed anything).
# 0 disables the guard (legacy pure-timer behavior). If the count is
# unavailable at episode start the baseline is captured late at the first
# parseable check; if it never parses the fire fails open.
# Tuned 2000 -> 500 (2026-06-11 production calibration): very quiet idle
# periods can drip just under 2k context tokens per 480s window (observed
# tokens_delta=1857 on a false fire), so 2000 failed to re-arm and fired
# on a live turn. 500 re-arms on any real turn while a genuinely wedged
# zero-progress turn still fires.
min_tokens_delta = 500
# Host-heartbeat freshness gate (v3, 2026-06-11): complements the
# token-progress guard above. An ultra-quiet but alive session (an
# event-driven loop handling only periodic ticks) can grow context tokens
# SLOWER than min_tokens_delta per backoff window (observed
# tokens_delta=230 on a false fire), so the v2 re-arm never engages and a
# parked-open idle turn still fires. In deployments where the supervised
# session touches the host heartbeat file ([claude].heartbeat_file) on a
# periodic cadence — e.g. on each daemon-emitted heartbeat-tick event —
# the file's mtime is a direct liveness signal: a wedged session stops
# touching it by design, and the daemon's separate heartbeat-stale
# detection escalates that case independently. At prolonged-thinking fire
# time, a heartbeat mtime younger than this many seconds suppresses the
# fire and RE-ARMS the thinking timer (timer + token baseline slide to
# now, same as the v2 re-arm); a stale mtime lets the fire proceed.
# Fail-open: missing/unreadable file or future mtime allows the fire.
# 0 disables the gate. Default 600 = two 5-minute touch cadences, so a
# single missed touch doesn't mask a real wedge.
heartbeat_fresh_secs = 600

[watcher_monitor]
# Enable individual watcher health tracking
enabled = true
# Watchers config file (same format as watchmen)
watchers_config = "~/.config/watchmen/watchers.conf"
# Expected watchmen supervisor count
expected_watchmen = 0
# Consecutive missing checks before injecting restart (3 = ~30s at 10s interval).
# Bumped from 6 → 3 — tighter detection latency, matches event_threshold so quiet-path
# event + loud tmux-inject fire on the same cycle.
inject_threshold = 3
# Cooldown between watcher-missing injections (seconds).
# 2026-04-28: Tightened 300 -> 60 (PR #44). A down watcher is a hard
# liveness failure (no signal, no events, no torrents getting through),
# so when the previous inject didn't land — e.g. main loop was
# mid-tool-call and ate the tmux keystroke — we want to re-inject
# quickly rather than wait 5 minutes while the user is silent. Paired
# with the global-post-interrupt-cooldown EXEMPTION on the watcher-down
# path (src/policy.rs check_once); the prior cascade-suppression
# rationale from the 2026-04-21 raise no longer applies.
inject_cooldown = 60
# NOTE (2026-05-01): `auto_restart_cooldown_secs` was removed along with the
# daemon-side auto-restart path. Watchers can ONLY be spawned by Claude
# Code's main loop (cardinal rule); claude-watch's only emergency action
# is the tmux-inject above, which types `watcher-ctl run <name>` into the
# pane and lets the main loop spawn the watcher in its own process tree.
# Quiet path (PR #48): emit a `watcher-down` claude-event
# (source=claude-watch, tag=watcher-down) when consecutive_missing hits
# this threshold. Set below inject_threshold so the quiet path runs first
# and the loud tmux-inject is reserved as a fallback. Default 3 (~30s at
# 10s interval).
event_threshold = 3
# Grace period (seconds) after a quiet-path event is emitted, during
# which the heavyweight tmux-inject path is suppressed for the same
# watcher. If the watcher is still missing past the grace window, the
# inject path activates as fallback (covers the chicken-and-egg case
# where the consumer watcher itself is missing or stalled). Default 60.
event_grace_secs = 60
# Path to the `claude-event` CLI used to fire watcher-down events.
# Resolved via $PATH by default.
event_command = "claude-event"
# Watcher name whose absence makes the quiet path useless (no consumer
# for the event). When THIS watcher is the missing one, claude-watch
# skips event emission and falls through to inject immediately.
event_consumer_watcher_name = "claude-event-watch"

[context_monitor]
# Enable context usage monitoring and deferred self-clear
enabled = true
# Fixed token margin from max: trigger when tokens >= max - margin (overrides threshold_percent)
# 100K margin (trigger at 900K / 90%) gives headroom for accumulated image
# attachments (e.g., messaging-app photos we Read into context). Large images consume many tokens
# AND count against Anthropic's per-request image-dimension limit — firing the self-clear
# earlier prevents sessions from hitting the "image exceeds dimension limit for many-image
# requests" wall before the clear can land.
threshold_margin = 100000
# Token percentage threshold (legacy fallback, ignored when threshold_margin is set)
threshold_percent = 75
# Compact remaining % at which to trigger (primary — "Context left until auto-compact: N%")
compact_trigger_percent = 5
# Grace period before forced self-clear (seconds)
# Set to 300s (5min) — gives the agent enough time to wrap up the current
# turn (commit/push, session-task set, attendant tool calls) before the
# daemon force-clears. The deferred-clear child polls in 10s slices so
# fire-time matches displayed value within ~10s when tokens stay high
# (and the child exits cleanly with no clear if tokens drop below 30k).
grace_period = 300
# Minimum interval between context clear triggers (seconds)
cooldown = 300

[malformed_tool_call]
# Detect MALFORMED tool calls — the model emitting raw, NON-namespaced
# `<invoke ...>` / `<parameter ...>` tags (often with a stray literal text
# prefix glued to the front) instead of a well-formed namespaced tool call.
# A correctly-formed call is consumed by the harness and shown only as a
# tool-use widget; the raw tags never reach the pane as text. So a raw
# non-namespaced tag visible in the live tail means the harness did NOT run
# the call — it rendered as plain assistant text and the INTENDED action
# (commonly `watcher-ctl run claude-event-watch`, a `signal-send`, or a
# heartbeat `touch`) silently never ran. Sustained, this strands one-shot
# watchers DOWN, drives the heartbeat stale, and produces hours of
# failure / heartbeat-stale / watcher-down alert storms (the 2026-06-17
# incident).
#
# Detection is STRUCTURAL (AST-style), not a substring grep: claude-watch
# tokenizes the candidate region and only fires on a confirmed tool-call
# CONSTRUCT — a non-namespaced `<invoke name="...">` opener corroborated by a
# `<parameter name="...">` and/or a `</invoke>` close — and it SKIPS anything
# inside a fenced code block (```...```). This is what cuts the false positives
# a plain grep produced on text turns that merely mention the tags.
#
# Enforcement is ESCALATING. A malformed call renders as assistant TEXT and
# never reaches a PreToolUse hook, so there is no true pre-execution block at
# this layer (the enforcement ceiling). The strongest feasible enforcement is a
# relentless escalating inject that halts forward progress until a clean call is
# observed: phase-1 soft nudge (cooldown-gated) escalating, after
# `escalate_after` un-cleared nudges, to a phase-2 HARD BLOCK that re-interrupts
# and re-injects EVERY cycle (no cooldown) until a clean turn appears.
enabled = true
# Consecutive check cycles the malformed signature must be observed before
# injecting the nudge (at the 10s general interval, 2 ≈ 20s of sustained
# malformation). Conservative so a single transient render — or a pane that
# merely quotes the tag strings — does not trip it.
consecutive = 2
# Cooldown between PHASE-1 (soft) corrective nudges (seconds). Avoids spamming
# the pane while the model recovers on its own. The phase-2 hard block ignores
# this cooldown.
cooldown = 180
# Number of soft nudges that may fire (without the malform ever clearing)
# before escalating to the phase-2 hard block. 0 = hard-block immediately;
# a very large value = stay nudge-only.
escalate_after = 2
# Marker file that, when present, fully disables malformed detection (manual
# false-positive override; mirrors the AskUserQuestion-allowed marker). Create
# it with `sudo touch <path>` while deliberately driving a turn about the tags;
# remove it to re-arm. Empty string disables the marker check.
override_marker = "/var/run/claude/malformed-detection-disabled"
# The PHASE-1 (soft) corrective text injected into the pane. Single-line by
# design (the inject_text vim-mode pipeline expects one literal send_keys -l
# call).
nudge = "claude-watch: your last tool call was MALFORMED (raw non-namespaced invoke/parameter tags rendered as text, so it did NOT run). Re-emit that exact action as a single well-formed tool call with NO stray text before the tag, then verify each watcher is actually up (watcher-ctl status) and touch the heartbeat if it was a heartbeat turn."
# The PHASE-2 (hard-block) corrective text. Firmer, and re-injected every cycle
# until the malform clears.
hard_block_nudge = "claude-watch HARD BLOCK: you are STILL emitting malformed (raw non-namespaced invoke/parameter) tool calls — they are NOT executing. STOP all other work. Do nothing except re-emit the single intended action as ONE well-formed tool call with no stray text before the tag. claude-watch will keep interrupting every cycle until a clean call is observed."

[auto_update]
# Enable automatic version update checks
enabled = true
# Minute of hour (0-59) to check for updates
check_minute = 10
# Minimum hours between update attempts
cooldown_hours = 1
# Text injected into Claude Code after restart completes.
#
# This is the FIRST UserPromptSubmit the main loop sees after a
# claude-watch auto-update restart. Bare "resume" wasn't enough: at
# /exit time any in-flight subagent gets orphaned (its tmux pane is
# gone, its `claude-watch active-agents` entry goes stale, but its
# session-task queue row stays `running` and its PR — if any — stays
# open). Without an explicit orphan-recovery step in the resume
# prompt, PR-shipping work sits unmerged until something external
# (WorkQueueOrphaned alert, Andrew flagging) notices.
#
# This prompt makes recovery deterministic: run normal resume, audit
# the queue, probe each repo-scope running item against
# `claude-watch active-agents`, recover via PR state, leave
# workload:* alone (they survive restarts by design), then proceed.
#
# Single-line by design — tmux inject_text's vim-mode dd/i pipeline
# expects one literal send_keys -l call. Multi-line bodies fight
# Claude Code's Enter-to-submit input handling.
resume_prompt = "post-restart recovery: run `session-resume restart`, then for each `session-task queue list` running item whose agent is missing from `claude-watch active-agents` and scope is repo:* (NOT workload:* — workloads survive restart): probe PR state — open PR + green CI → spawn a merge-and-redeploy recovery agent (pass PR # + queue id); open PR + CI in-progress → spawn a CI-watch recovery agent; no PR → `session-task queue abandon <id>` (reason: agent orphaned across restart). Then resume normal dispatch."

[reauth]
# Detect when Claude Code needs API reauth and send high-priority alerts
enabled = true
# Interval between repeated alerts (seconds); 10800 = 3 hours
alert_interval_seconds = 10800

[task_watch]
# Enable task-watch daemon loop (auto-manage tmux panes for background tasks)
enabled = true
# Tmux session name for task panes
session = "tasks"
# Poll interval for /proc scanning (seconds)
poll_interval = 5
# Delay before removing panes after task completes (seconds)
done_delay = 10
# Longer delay for agent panes (agents have gaps between writes)
agent_done_delay = 120
# Maximum number of task panes
max_panes = 20
# Show all tasks including persistent watchers (false = workloads only)
show_all = false

[suppression]
# Cross-gate suppression-escalation backstop. The watcher-down, fresh-/clear,
# and dead-process suppression gates each defer their inject when the main
# loop is "actively turning". A long sustained dispatcher window can hold
# the gate open indefinitely (real incident 2026-04-27: claude-event-watch
# was suppressed for 33 min). These two limits cap the suppression run.
# When EITHER trips on the next gate-fire, the fire force-injects regardless.
# Counters are SHARED across all three gates (see State.consecutive_suppressions).
#
# After this many consecutive suppressed fires, the next fire force-injects.
# Raised 3 -> 10000 (2026-06-23, Andrew): claude-event-watch is surface-and-exit
# (it exits after every event), so its watcher-down condition is PERPETUAL and
# the suppression counter never resets while the main loop is actively turning +
# restarting it. At cap=3 the escalation force-injected a destructive tmux
# interrupt every ~30s, which cancelled in-flight turns and KILLED freshly
# spawned background agents (the all-night "agent stopped by user" mystery).
# The heartbeat-stale path remains the genuine-wedge backstop, so suppressing
# this force-inject while actively-turning is safe. Root fix (make
# claude-event-watch a resident poller so it stops flapping) is a follow-up.
max_consecutive_suppressions = 10000
# Wall-clock backstop (seconds) since the FIRST suppression in the current run.
# Raised 600 -> 86400 for the same reason as the consecutive cap above.
max_suppression_window_secs = 86400

[api_retry]
# Upstream-API retry-backoff detection.
#
# When Anthropic returns 529 (overloaded) or transient 5xx errors, Claude Code
# retries with exponential backoff and prints lines like:
#   API Error: 529 {"type":"error","error":{"type":"overloaded_error",...}}
#   ⎿  Retrying in 24s · attempt 3/10
# During that window every claude-watch inject (Escape + text) wipes the retry
# state machine and forces Claude to start a brand-new turn — which then hits
# the same overload and re-enters retry. The result is a livelock where the
# daemon's interrupts perpetually reset the retry timer (seen 2026-04-28).
#
# When this guard is enabled, the daemon detects the retry banner each cycle
# and suppresses fires from the four sites that matter (prolonged-thinking,
# watcher-down, context-warning, wedged-clear) until the retry resolves OR
# max_stuck_secs elapses (whichever happens first). Heartbeat / dead-process
# detection are NOT suppressed — those measure liveness and must still alert.
enabled = true
# Number of consecutive check cycles a retry banner must be observed before
# suppression activates. Default 1 (suppress on first detection — the cost of
# a missed interrupt is negligible compared to the cost of resetting the
# retry loop).
consecutive = 1
# Maximum seconds the suppression may persist before the daemon resumes
# normal monitoring (so a hung retry banner doesn't suppress recovery
# forever). Default 1800 = 30 minutes.
max_stuck_secs = 1800

[stuck_detection]
# Workload-heartbeat-driven suppression of false-positive stuck alerts.
#
# Long-running `workload run` invocations (stv-promote, big rsyncs, ffmpeg)
# can pin the main loop in a fire-and-forget wait that looks like
# heartbeat-stale or prolonged-thinking from the daemon's vantage. The
# workload wrapper writes + touches a heartbeat file at
# `<workload_heartbeat_dir>/<label>.heartbeat` every 30s while the
# user command runs. Before firing heartbeat-stale OR prolonged-thinking
# alerts, the daemon scans the dir; if ANY file's mtime is within
# `workload_heartbeat_max_age_secs`, the alert is SUPPRESSED.
#
# Distinct from the legacy 15-min `/var/run/claude/workload-state/<label>.heartbeat`
# (consumed by `cron-workload-stale-check` for 1h+ wedged-workload
# detection). The two heartbeats coexist and serve different purposes.
# Note the workload-state subdir lives off `/var/run/claude/` post-2026-05-18
# migration off `/tmp`; a `/tmp/claude-workloads` symlink is maintained
# for back-compat with out-of-tree consumers.
enabled = true
workload_heartbeat_dir = "/run/claude/workloads"
workload_heartbeat_max_age_secs = 60

[queue_check]
# Native in-tree emission of stuck / orphaned queue-item claude-events.
#
# The `claude-watch queue-check` subcommand (run from cron) inspects the
# session-task queue and detects:
#   * ORPHANED — a `running` item whose explicitly-claimed owning PID is no
#     longer alive (pid=null items are trusted-alive and never flagged).
#   * STUCK    — a `wedged` item, OR a `running` item whose
#     `last_heartbeat_at` is older than `stale_heartbeat_min`.
# On detection it emits a `queue-orphaned` / `queue-stuck` claude-event
# (single-emit per qid+condition). This is the IN-TREE equivalent of the
# out-of-tree Prometheus `WorkQueueOrphaned` / `WorkQueueStuckSoft` alert
# rules, so stuck/orphan detection no longer depends on external Prometheus.
#
# emit_events is DEFAULT FALSE: the capability ships in every build but
# stays silent unless explicitly enabled here. Detection still runs (so
# `queue-check --dry-run` / `--force-emit` work regardless); this toggle
# only controls whether normal cron runs write event files.
emit_events = false
# Heartbeat-staleness threshold (minutes) for the STUCK condition. Default
# 15 mirrors the deployed WorkQueueStuckSoft `for:15m` window. The
# `--stale-heartbeat-min` CLI flag overrides this per-run.
stale_heartbeat_min = 15

[hybrid]
# Hybrid hooks + daemon-fallback tuning.
#
# When enabled, Claude Code hooks (SessionStart/Stop/PreCompact) fire
# conversational reminders via `claude-watch hook-fire`. The daemon records
# a marker for each fire and defers its heavy-handed tmux injections
# (/clear, claude update) for the configured grace window so Claude has a
# chance to self-act. If the reminder is stale, the daemon falls back to
# the old always-inject behaviour and bumps fallback_*_count metrics.
#
# See `skills/setup-hooks.md` for the installer.
enabled = true
# Grace window after a context_high hook fire before the daemon forces
# `/clear` via tmux. Default 5 minutes.
context_fallback_secs = 300
# Grace window after a version_update hook fire before the daemon runs
# `claude update`. Default 15 minutes — Claude often needs a few turns to
# hit a stopping point before restarting.
version_fallback_secs = 900

[cadence]
# Daemon-emitted cadence claude-events. The daemon is already a
# long-running monitor loop, so it is the natural source for periodic
# "cadence" signals — replacing a separate self-rescheduling reminder
# background task that the main loop otherwise had to keep restarting.
#
# Two events are emitted on the daemon's monotonic clock:
#   * heartbeat-tick  — every heartbeat_tick_interval_secs (300s = 5min). A light
#                       wake signal so the main loop has a recurring event
#                       to react to even while idle. Its body carries the
#                       host heartbeat-file path to touch in data.path — the
#                       configurable [claude].heartbeat_file above (the same
#                       path the daemon monitors for staleness), so the two
#                       never drift apart.
#   * memory-reminder — every memory_reminder_interval_secs (1800s = 30min),
#                       carrying the action checklist (update logs, commit
#                       + push repos, etc.).
#
# IMPORTANT: the daemon emits these EVENTS only — it deliberately does NOT
# write any host heartbeat *file*. That stays the main loop's job so a
# wedged loop's heartbeat goes stale and the existing stale-detection
# fires. If the daemon wrote the file directly it would mask a dead loop.
enabled = true
# Intervals are omitted on purpose: leaving them unset inherits the code
# defaults (HEARTBEAT_TICK_INTERVAL_SECS / MEMORY_REMINDER_INTERVAL_SECS in
# src/cadence.rs), which is the single source of truth. Uncomment to override
# on a specific host; otherwise a bump to the const is the only change needed.
#   heartbeat_tick_interval_secs = 300     # default: 5min
#   memory_reminder_interval_secs = 1800   # default: 30min

[ask_question_monitor]
# AFK auto-reject of a stale interactive AskUserQuestion prompt.
#
# Motivating incident: an unanswered AskUserQuestion froze the main loop.
# A pending interactive question reads as Idle (the menu still renders a
# selection cursor, so the idle-prompt scan classifies it as idle, NOT
# Thinking), so the prolonged-thinking detector never fired and the loop
# sat blocked until the heartbeat-stale alarm finally tripped at 389
# minutes. This monitor gives a FAST, specific
# "AskUserQuestion pending > N min" alarm.
#
# PHASE 1 (current): detect + alarm ONLY. claude-watch emits a
# `ask-question-stale` claude-event + pingme exactly once per pending
# question; it sends NO Escape and injects NOTHING (reject_enabled = false).
# Phase 2 will gate an Escape-based auto-reject on reject_enabled; Phase 3
# will then inject `explanation`. This composes with the already-live
# presence-gate (blocks the question outright when the operator is
# known-away) and heartbeat-stale (eventual last-resort backstop).
#
# Master switch for detection + alarm. Default true.
enabled = true
# Seconds an interactive AskUserQuestion prompt may sit pending (main loop
# blocked, reads as Idle) before the alarm fires. Default 240 (4 min) —
# fast relative to the ~10-15 min heartbeat-stale window.
stale_seconds = 240
# PHASE 2/3 gate. When true, claude-watch will auto-REJECT the stale
# question (Escape) and inject `explanation`. DEFAULT FALSE — Phase 1 ships
# detect + alarm only; the reject path is not yet wired.
reject_enabled = false
# PHASE 3 payload (unused in Phase 1 — no inject happens). The
# "use your judgement" text injected AFTER an auto-reject so the loop
# proceeds autonomously and safely. Carried now so the schema is stable
# across the phased rollout.
explanation = "claude-watch auto-rejected this prompt because it blocked the main loop while the operator was away. Do NOT ask again — use your judgement and proceed autonomously with the safest reasonable default, noting the assumption you made."
