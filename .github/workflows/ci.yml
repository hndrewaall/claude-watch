name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  no-warnings:
    name: Warning-Free Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release with -D warnings
        run: RUSTFLAGS="-D warnings" cargo build --release --tests
        env:
          # Promote any rustc warning to an error. Keeps dead code,
          # unused imports, etc. out of main. Mirrors the local
          # scripts/git-hooks/pre-commit gate.
          RUSTFLAGS: "-D warnings"

  unit-tests:
    name: Unit + Fixture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run unit + fixture tests
        run: cargo nextest run -E 'not binary(~e2e_)'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Start tmux server
        run: tmux start-server

      - name: Run e2e tests
        run: cargo nextest run -E 'binary(~e2e_)' --retries 2
        timeout-minutes: 5

  container-shell-tests:
    name: Container shell + shim tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run claude-tmux env passthrough + fail-loud warning tests
        run: make test-claude-tmux-env

      - name: Run exec-hook shim tests
        run: make test-hooks-shim

      - name: Run entrypoint CLAUDE_CMD construction tests
        run: make test-entrypoint

      - name: Run cw host-shim tests
        run: make test-cw
