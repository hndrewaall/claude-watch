name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  no-warnings:
    name: Warning-Free Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release with -D warnings
        run: RUSTFLAGS="-D warnings" cargo build --release --tests
        env:
          # Promote any rustc warning to an error. Keeps dead code,
          # unused imports, etc. out of main. Mirrors the local
          # scripts/git-hooks/pre-commit gate.
          RUSTFLAGS: "-D warnings"

  unit-tests:
    name: Unit + Fixture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run unit + fixture tests
        run: cargo nextest run -E 'not binary(~e2e_)'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Start tmux server
        run: tmux start-server

      - name: Run e2e tests
        run: cargo nextest run -E 'binary(~e2e_)' --retries 2
        timeout-minutes: 5

  container-shell-tests:
    name: Container shell + shim tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check baked-doc markdown links (no broken links)
        run: make test-doc-links

      - name: Check CLAUDE.md size budget (always-in-context guard)
        # Fails if a tracked CLAUDE.md exceeds its char ceiling (generic 40k;
        # container/baked-CLAUDE.md pinned by a ratchet allowlist so it can't
        # grow). CI is the REAL enforcement — the local pre-commit hook that
        # runs the same script is bypassable with `git commit --no-verify`.
        run: make test-claude-md-size

      - name: Run install-hooks (core.hooksPath + worktree) tests
        run: make test-install-hooks

      - name: Run claude-tmux env passthrough + fail-loud warning tests
        run: make test-claude-tmux-env

      - name: Run cron-toggle (cw-cron-run + cw-cron-toggle) tests
        run: make test-cron-toggle

      - name: Run exec-hook shim tests
        run: make test-hooks-shim

      - name: Run agent-msg embedded test suite
        run: make test-agent-msg

      - name: Run agent-tail embedded test suite
        run: make test-agent-tail

      - name: Run event-must-act toolchain tests
        run: make test-event-must-act

      - name: Run entrypoint CLAUDE_CMD construction tests
        run: make test-entrypoint

      - name: Run cw host-shim tests
        run: make test-cw

      - name: Run mcp-host-bash host-shim tests
        run: make test-mcp-host-bash

      - name: Run hostjob detached-runner tests
        run: make test-hostjob

      - name: Run mcp-proxy-auth-shim bearer-auth tests
        run: make test-mcp-proxy-auth-shim

      - name: Run install-host-deps shim tests
        run: make test-install-host-deps

      - name: Run launchd plist tests
        run: make test-launchd-plist

      - name: Run load-bearer-from-keychain wrapper tests
        run: make test-load-bearer-from-keychain

      - name: Run personal-mcp-host wrapper tests
        run: make test-personal-mcp-host

      - name: Run personal-mcp-host launchd plist tests
        run: make test-personal-mcp-host-plist

      - name: Run personal-mcp-host install.sh tests
        run: make test-personal-mcp-install

      - name: Run ttyd paste-handler tests
        run: make test-ttyd-paste-handler

      - name: Install inotify-tools (for claude-event-watch tests)
        run: sudo apt-get update && sudo apt-get install -y inotify-tools

      - name: Run watcher tests (self-clear + claude-event-watch debounce)
        run: make test-watchers
        timeout-minutes: 5

      - name: Install uv (for session-task tests)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install session-task companion CLIs onto PATH
        # `make install` would build claude-watch via cargo (heavy), so
        # we mirror just the script-symlink portion here. The
        # session-task force-start tests shell out to `obligations` and
        # `claude-event`; without both on PATH the registration / emit
        # calls silently no-op and tests assert on a missing
        # obligations.json. Symlinks let in-tree edits take effect
        # without a re-install round-trip.
        run: |
          mkdir -p "$HOME/bin"
          ln -sfn "$(pwd)/tools/session-task/session-task" "$HOME/bin/session-task"
          ln -sfn "$(pwd)/tools/obligations/obligations" "$HOME/bin/obligations"
          ln -sfn "$(pwd)/tools/claude-event/claude-event" "$HOME/bin/claude-event"
          ln -sfn "$(pwd)/tools/claude-event/claude-event-tail" "$HOME/bin/claude-event-tail"

      - name: Run session-task Python tests
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:$PATH"
          make test-session-task

      - name: Run obligations / hooks tests
        # These suites were previously local-only, which let a hook
        # behavior change merge while leaving its test failing on a
        # clean main checkout (caught only on the next local run).
        # Needs the companion-CLI symlinks from the step above
        # (pre-agent-queue-gate-hook.test exercises the real
        # session-task binary).
        run: |
          export PATH="$HOME/.local/bin:$HOME/bin:$PATH"
          make test-hooks
