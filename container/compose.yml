# claude-container — compose file for local dev iteration.
#
# Phase 1c (q-2026-05-11-40f3) canonical networking: default bridge networking
# with an explicit host-loopback alias so the in-container claude can dial the
# host's VSCode SSE listener via CLAUDE_CODE_IDE_HOST_OVERRIDE. The claude
# binary's source resolves the IDE host via the override env var first, else
# falls through to a hardcoded "127.0.0.1" on Linux/macOS — see project doc
# §3 and §8 "Phase 0d" for the empirical 4-test matrix. host.docker.internal
# is provided natively by Docker Desktop on macOS/Windows; on Linux Docker
# Engine the extra_hosts entry below makes it resolve to the host-gateway IP.

services:
  claude-container:
    build:
      # Repo-root context so the Dockerfile can COPY from sibling
      # tools/hooks/ (canonical home of the obligations gate hooks
      # baked into /usr/local/bin/).
      context: ..
      dockerfile: container/Dockerfile
    image: claude-container:dev
    # Give PID 1 (process-compose) room to finish its own graceful
    # shutdown before docker SIGKILLs it. Each supervised process pins
    # `shutdown.timeout: 3` in container/process-compose.yml; 15s of
    # docker grace is comfortable headroom even if they tear down
    # sequentially. A grace period shorter than process-compose's total
    # shutdown lets docker SIGKILL PID 1 mid-teardown, orphaning cron /
    # claude-watch grandchildren that pin the shared volumes + tmux
    # socket — the root cause of the `up --force-recreate` hang.
    stop_grace_period: 15s
    # Bridge networking (default): no network_mode line. The container lives in
    # its own netns; cross-container/host traffic goes through the bridge and
    # the host-gateway alias declared in extra_hosts.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Bind mounts: ~/.claude (session JSONL + creds), ~/repos (code),
    # $PWD (the directory the user invoked compose from, mounted at /workspace).
    # All three must round-trip uid 1000 cleanly.
    #
    # ${HOME} interpolation requirement:
    # `sudo docker compose up` does NOT preserve the caller's HOME by default.
    # Sudo strips it to root's, so a bare `sudo docker compose up` substitutes
    # ${HOME} -> /root and the bind mounts point at /root/.claude / /root/repos
    # on the host, breaking JSONL discovery + auth chain. Invoke compose with
    # `sudo -E docker compose up` (preserve HOME) or
    # `sudo HOME=$HOME docker compose up` (explicit). See README "Run (without
    # the wrapper)" for the wrapped form.
    #
    # Named volume `claude-container-versions` (Phase 1d, q-2026-05-11-c0b9):
    # mounted at /home/hndrewaall/.local/share/claude so the in-container
    # claude binary's auto-updates persist across `--rm` container exits.
    # Without this, every container restart resets to the image-baked claude
    # version (currently 2.1.139). The image-baked /usr/local/bin/claude
    # stays on PATH as the floor; auto-updates land in versions/<ver>/ inside
    # the volume and ~/.local/bin/claude (also inside the volume) wins on
    # PATH resolution once present. See project doc §5 Phase 1 decision 2 +
    # §6 risk 6 for the image-baked-vs-volume drift discussion.
    volumes:
      - ${HOME}/.claude:/home/hndrewaall/.claude
      - ${HOME}/repos:/home/hndrewaall/repos
      - ${PWD}:/workspace
      - claude-container-versions:/home/hndrewaall/.local/share/claude
      # claude-watch state dir — holds active-agents.json (the JSON state
      # file the in-container claude-watch active-agents writer cron
      # publishes every minute) and any other in-container daemon state
      # that needs to survive container recreate.
      #
      # Default: anonymous named volume `claude-watch-state`, managed by
      # docker, mounted at /var/lib/claude-watch. Works out of the box on
      # any host — `docker compose up` and the writer has a place to land
      # bytes without any operator setup.
      #
      # Override: set CW_STATE_PATH=/absolute/host/path before invoking
      # compose to bind-mount that host directory instead. Useful for
      # deployments that want sibling containers (queue-minisite et al)
      # on the same host to read the state file directly from the host
      # filesystem rather than via docker volume plumbing. The
      # `${CW_STATE_PATH:-claude-watch-state}` interpolation expands to
      # the host path when set (compose treats absolute paths as bind
      # mounts) or to the named-volume literal when unset.
      - ${CW_STATE_PATH:-claude-watch-state}:/var/lib/claude-watch
      # Operator-specific cron entries (PR-watch loops, custom event
      # emitters, anything referencing host paths). Default cron
      # entries baked into the image at /etc/cron.d/cw-default fire
      # regardless; this slot is for the per-host additions.
      #
      # Files inside the bind-mounted dir must be root:root mode 0644
      # (cron's standard requirement for /etc/cron.d/ entries). Each
      # file follows the standard `m h dom mon dow user command`
      # format. Files inside the private dir are picked up by cron's
      # recursive read of /etc/cron.d/.
      #
      # Uncomment + set the host path to enable:
      # - "/host/path/to/private-cron.d/:/etc/cron.d/private/:ro"
    environment:
      # Explicit passthrough of the Claude Code SSE port set by VSCode.
      - CLAUDE_CODE_SSE_PORT
      - ANTHROPIC_API_KEY
      # Tell the in-container claude to dial host.docker.internal for SSE
      # instead of falling through to 127.0.0.1 (which under bridge networking
      # points at the container's own loopback). Preserve a caller-set override.
      - CLAUDE_CODE_IDE_HOST_OVERRIDE=${CLAUDE_CODE_IDE_HOST_OVERRIDE:-host.docker.internal}
    stdin_open: true
    tty: true

volumes:
  # claude-container-versions — persists the in-container claude binary's
  # auto-updated versions/<ver>/ tree across `--rm` container exits.
  # First-launch behavior: volume is empty, in-container claude falls back
  # to the image-baked /usr/local/bin/claude (currently 2.1.139). Once the
  # in-container claude self-updates, the new versions/<ver>/ + ~/.local/bin
  # symlinks live in this volume and survive container teardown.
  # Inspect: `docker volume inspect claude-container-versions`.
  # Nuke:    `docker volume rm claude-container-versions`.
  claude-container-versions:
  # claude-watch-state — default backing store for /var/lib/claude-watch
  # inside the container. Holds active-agents.json and any other in-
  # container daemon state that needs to survive `docker compose up
  # --force-recreate`. Only declared (and only used) when CW_STATE_PATH
  # is unset; when CW_STATE_PATH is set the compose interpolation
  # rewrites the volume reference to a host bind-mount, and this named
  # volume is left dangling (no-op).
  # Inspect: `docker volume inspect claude-watch-state`.
  # Nuke:    `docker volume rm claude-watch-state`.
  claude-watch-state:
