# claude-container process-compose supervisor config.
#
# Escalation past the README's tini-threshold rule: when the container
# grew to multiple long-running services (claude-watch daemon + crond,
# alongside the foreground tmux session), tini stopped being enough —
# it doesn't model service dependencies, doesn't restart on failure,
# and doesn't centralize logging. process-compose replaces it as the
# supervisor.
#
# Loaded by /usr/local/bin/claude-tmux-entrypoint after the setup phase
# (PATH wiring, hooks-shim generation, trust-workspace) finishes:
#
#   exec process-compose up --config /opt/claude-container/process-compose.yml \
#       --tui=false --no-server
#
# Each process is declared with an explicit `availability:` block so a
# crash (claude-watch panic, crond SIGSEGV) triggers a restart instead
# of leaving a half-dead container.
#
# `is_tty: true` on the tmux-attach process tells process-compose to
# wire stdin/stdout/stderr from PID 1 (process-compose itself) through
# to the process, so `docker run -it` keeps interactive behaviour.
# Without this, tmux attach would lose its controlling terminal and
# exit immediately.
#
# Process ordering:
#   setup-tmux-session  (oneshot) creates the tmux session in detached
#                       mode. Anything that observes the session
#                       (claude-watch, the operator's eventual tmux
#                       attach) depends on this completing.
#   tmux-attach         (interactive) attaches to the session. This is
#                       the foreground process that holds the
#                       container open from docker's perspective.
#   claude-watch        (long-running) monitors the in-container claude
#                       pane via tmux capture-pane.
#   crond               (long-running) drives the baked /etc/cron.d/
#                       entries (active-agents writer, metrics emit)
#                       plus any operator-bind-mounted /etc/cron.d/
#                       additions.
#
# NOTE: a `cw-watcher-supervisor` process used to be declared here too.
# Its binary was deleted when watchers moved to session-scoped
# run_in_background tasks (block-print-exit contract — see
# container/watchers/README.md); the service entry would crash-loop on
# the missing binary, so it was removed.

version: "0.5"

# Default log_location is unused — each process opts into a custom
# log_location below. process-compose writes startup chatter to stderr
# of the supervisor itself, which docker captures.
#
# ---------------------------------------------------------------------
# Shutdown timing — why every long-running process pins an explicit
# `shutdown.timeout`.
#
# On `docker stop` / `docker compose up -d --force-recreate`, docker
# sends SIGTERM to PID 1 (process-compose) and waits the service's
# `stop_grace_period` before escalating to SIGKILL. process-compose
# then runs ITS OWN graceful shutdown: it signals each supervised
# process and waits up to that process's `shutdown.timeout` (upstream
# DEFAULT = 10s) before SIGKILLing it.
#
# That default is LONGER than docker's grace period. Historically two
# of our processes also didn't die on a plain SIGTERM, which made the
# leak worse:
#   - crond ran as `sudo -n /usr/sbin/cron`; with PAM defaults sudo
#     FORKS the cron child (it defines a sudoers close function) and
#     stays alive as a monitor, so process-compose tracked the sudo
#     wrapper and SIGKILL left the forked ROOT cron orphaned. FIXED:
#     the Dockerfile sudoers carve-out disables pam_session +
#     pam_setcred for the cron argv so sudo now `execve()`s cron
#     directly (the supervised process IS the daemon). See the crond
#     block below.
#   - any process whose launcher leaves a blocked reader (e.g. a tee
#     on a pipe) alive. FIXED: cw-claude-watch-launch `exec`s the
#     daemon instead of running it behind a pipeline.
# With the 10s-per-process default, process-compose was still mid-wait
# when docker's grace elapsed and SIGKILLed process-compose. Killing
# PID 1 without it having reaped its children left grandchildren (cron,
# claude-watch) holding the shared named volumes + tmux socket — which
# is exactly what wedged a recreate-IN-PLACE. A full `docker compose
# down` tears the whole project + its netns down, so it papered over
# the leak — which is why down+up "worked" but force-recreate hung.
#
# Defense in depth: (1) sudo execs cron + the launcher execs
# claude-watch, so SIGTERM reaches both daemons with no orphaned
# wrapper; (2) each long-running process pins `shutdown.timeout: 3s`
# so process-compose escalates to SIGKILL fast and finishes its whole
# shutdown well inside docker's `stop_grace_period` (15s in
# docker-compose.yml as headroom). SIGKILL can't be ignored, so even a
# wedged daemon dies promptly. The timeout is the backstop; the
# exec-not-fork fixes are the primary cure.
# ---------------------------------------------------------------------

processes:
  setup-tmux-session:
    description: Create the in-container tmux session (detached).
    command: /usr/local/bin/cw-tmux-bootstrap
    availability:
      restart: no
    # disabled=false explicit so a future override doesn't silently
    # skip the setup oneshot.
    disabled: false

  tmux-attach:
    description: Foreground tmux attach (the operator's interactive UI).
    command: tmux attach-session -t claude-container
    depends_on:
      setup-tmux-session:
        condition: process_completed_successfully
    is_tty: true
    availability:
      # If the operator detaches via Ctrl-b d the attach process exits
      # with 0; we don't want process-compose to relaunch it (the
      # session still exists, the operator can re-attach manually via
      # `docker compose exec <c> tmux attach`). Container shutdown
      # happens when process-compose itself exits.
      restart: no

  claude-watch:
    description: claude-watch daemon — observes the in-container claude pane.
    command: /usr/local/bin/cw-claude-watch-launch
    depends_on:
      setup-tmux-session:
        condition: process_completed_successfully
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 0  # 0 == unlimited
    # SIGTERM (default) then SIGKILL after 3s. The launcher `exec`s
    # claude-watch directly so this process IS the daemon; SIGTERM
    # reaches it. The short timeout is the backstop against a wedged
    # daemon so process-compose finishes shutdown inside docker's
    # grace period.
    shutdown:
      signal: 15
      timeout: 3
    disabled: ${CLAUDE_CONTAINER_DAEMON_DISABLED:-false}

  crond:
    description: vixie-cron daemon — runs /etc/cron.d/ entries.
    # `-f` keeps cron in the foreground; `-L 15` routes scheduling
    # logs (LOG_INFO+LOG_NOTICE+LOG_WARNING) to stderr so the
    # supervisor's per-process log captures them.
    #
    # CRITICAL — clean teardown depends on sudo EXECing cron, not
    # forking it. By default Debian's sudo (PAM, pam_session +
    # pam_setcred on) defines a sudoers close function, so it FORKS
    # the cron child and stays alive as a monitor; process-compose
    # would then track the `sudo` wrapper, and on SIGKILL the forked
    # ROOT cron would survive and pin the container netns + shared
    # tmux-socket volume — wedging `up --force-recreate` (and hence
    # in-container self-redeploy). The Dockerfile's sudoers carve-out
    # disables pam_session + pam_setcred for this exact argv
    # (`Defaults!CRON_NOFORK !pam_session, !pam_setcred`, where
    # CRON_NOFORK = `/usr/sbin/cron -f -L 15`), so sudo `execve()`s
    # cron directly. The process process-compose launches and signals
    # IS the cron daemon — no orphan, so SIGTERM (then the 3s-timeout
    # SIGKILL backstop) tears it down cleanly inside docker's grace
    # period. The exact argv here MUST match the CRON_NOFORK alias in
    # container/Dockerfile or sudo falls back to its forking default.
    command: sudo -n /usr/sbin/cron -f -L 15
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 0
    # SIGTERM first; because sudo now execs cron directly this reaches
    # the daemon. The 3s timeout is the backstop: process-compose
    # escalates to SIGKILL fast so its whole shutdown completes inside
    # docker's stop_grace_period instead of leaking an orphan.
    shutdown:
      signal: 15
      timeout: 3
    disabled: ${CLAUDE_CONTAINER_CRON_DISABLED:-false}
