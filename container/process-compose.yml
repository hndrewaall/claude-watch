# claude-container process-compose supervisor config.
#
# Escalation past the README's tini-threshold rule: when the container
# grew to three long-running services (claude-watch daemon + crond +
# cw-watcher-supervisor, alongside the foreground tmux session), tini
# stopped being enough — it doesn't model service dependencies, doesn't
# restart on failure, and doesn't centralize logging. process-compose
# replaces it as the supervisor.
#
# Loaded by /usr/local/bin/claude-tmux-entrypoint after the setup phase
# (PATH wiring, hooks-shim generation, trust-workspace) finishes:
#
#   exec process-compose up --config /etc/claude-code/process-compose.yml \
#       --tui=false --no-server
#
# Each process is declared with an explicit `availability:` block so a
# crash (claude-watch panic, crond SIGSEGV, watcher-supervisor crash)
# triggers a restart instead of leaving a half-dead container.
#
# `is_tty: true` on the tmux-attach process tells process-compose to
# wire stdin/stdout/stderr from PID 1 (process-compose itself) through
# to the process, so `docker run -it` keeps interactive behaviour.
# Without this, tmux attach would lose its controlling terminal and
# exit immediately.
#
# Process ordering:
#   setup-tmux-session  (oneshot) creates the tmux session in detached
#                       mode. Anything that observes the session
#                       (claude-watch, the operator's eventual tmux
#                       attach) depends on this completing.
#   tmux-attach         (interactive) attaches to the session. This is
#                       the foreground process that holds the
#                       container open from docker's perspective.
#   claude-watch        (long-running) monitors the in-container claude
#                       pane via tmux capture-pane.
#   crond               (long-running) drives the baked /etc/cron.d/
#                       entries (active-agents writer, metrics emit)
#                       plus any operator-bind-mounted /etc/cron.d/
#                       additions.
#   cw-watcher-supervisor (long-running) reads
#                       /etc/claude-code/watchers/*.toml and respawns
#                       the operator-baked watchers (claude-event-tail
#                       et al) with per-watcher restart policies.

version: "0.5"

# Default log_location is unused — each process opts into a custom
# log_location below. process-compose writes startup chatter to stderr
# of the supervisor itself, which docker captures.

processes:
  setup-tmux-session:
    description: Create the in-container tmux session (detached).
    command: /usr/local/bin/cw-tmux-bootstrap
    availability:
      restart: no
    # disabled=false explicit so a future override doesn't silently
    # skip the setup oneshot.
    disabled: false

  tmux-attach:
    description: Foreground tmux attach (the operator's interactive UI).
    command: tmux attach-session -t claude-container
    depends_on:
      setup-tmux-session:
        condition: process_completed_successfully
    is_tty: true
    availability:
      # If the operator detaches via Ctrl-b d the attach process exits
      # with 0; we don't want process-compose to relaunch it (the
      # session still exists, the operator can re-attach manually via
      # `docker compose exec <c> tmux attach`). Container shutdown
      # happens when process-compose itself exits.
      restart: no

  claude-watch:
    description: claude-watch daemon — observes the in-container claude pane.
    command: /usr/local/bin/cw-claude-watch-launch
    depends_on:
      setup-tmux-session:
        condition: process_completed_successfully
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 0  # 0 == unlimited
    disabled: ${CLAUDE_CONTAINER_DAEMON_DISABLED:-false}

  crond:
    description: vixie-cron daemon — runs /etc/cron.d/ entries.
    # `-f` keeps cron in the foreground; `-L 15` routes scheduling
    # logs (LOG_INFO+LOG_NOTICE+LOG_WARNING) to stderr so the
    # supervisor's per-process log captures them.
    command: sudo -n /usr/sbin/cron -f -L 15
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 0
    disabled: ${CLAUDE_CONTAINER_CRON_DISABLED:-false}

  cw-watcher-supervisor:
    description: Watcher launcher supervisor — respawns claude-event-tail et al.
    command: /usr/local/bin/cw-watcher-supervisor
    availability:
      restart: on_failure
      backoff_seconds: 5
      max_restarts: 0
    disabled: ${CLAUDE_CONTAINER_WATCHER_SUPERVISOR_DISABLED:-false}
