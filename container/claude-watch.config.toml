# claude-watch configuration — in-container default.
#
# Shipped at /etc/claude-watch/config.toml in the image. The entrypoint
# exports CLAUDE_WATCH_CONFIG to point at this file so the bare
# `claude-watch` daemon invocation in pane 1 picks it up regardless of
# whether the host's ~/.config/claude-watch/ is bind-mounted.
#
# Differences from a typical host config:
#   - dashboard_session = "claude-container"  (the in-container tmux session
#     that entrypoint.sh creates, not the host's "dashboard" session).
#   - dashboard_pane = "claude-container:0.0" (the claude pane is left/main,
#     pane 1 — this one — is the sidecar reading pane 0).
#   - File paths follow the FHS: logs under /var/log/claude-watch/,
#     runtime (locks, heartbeat, relaunch script) under /var/run/claude/,
#     persistent state under /var/lib/claude-watch/. All three are
#     pre-created uid-1000-owned by the Dockerfile so the in-container
#     daemon (uid 1000) writes them without root or runtime mkdir.
#   - auto_update / reauth / hybrid hooks disabled (host integrations).
#   - task_watch disabled (no in-container `tasks` session yet).
# Phase 1e (q-2026-05-11-8a96).

[general]
check_interval = 5
state_file = "/home/hndrewaall/.cache/claude-watch/state.json"
log_file = "/var/log/claude-watch/claude-watch.jsonl"
legacy_log_file = "/var/log/claude-watch/claude-watch.log"
# Global post-interrupt cooldown (seconds): 5-min outer ceiling on ALL
# interrupt fires (prolonged-thinking, context-warning, auto-respawn).
# Raised 60 -> 300 (2026-06-11). Per-type cooldowns stay the inner
# lower-bound; this is the outer ceiling. User-overridable.
post_interrupt_cooldown_secs = 300
# Keep watcher-down EXEMPT from the global ceiling — a down watcher is a
# hard-liveness escape hatch. Set false to subject watcher-down to the
# global gate too.
global_cooldown_exempt_watcher_down = true

[tmux]
# Pin to the in-container tmux session created by entrypoint.sh.
# Pane 0.0 is the claude pane; pane 0.1 (where this daemon runs) is the
# sidecar. claude-watch reads pane 0.0 via `tmux capture-pane`.
dashboard_pane = "claude-container:0.0"
dashboard_session = "claude-container"
post_escape_settle_ms = 0
# FleetView "return to main" keystrokes, sent FIRST on every inject so injected
# text lands on the MAIN conversation and never on a background agent SELECTED in
# Claude Code's FleetView (Andrew #270/#288/#291). Each entry is a tmux send-keys
# key name; default empty = no-op. Set to the key(s) a live FleetView confirms
# returns the selection to `main` (e.g. ["Right"]).
focus_main_keys = []

[claude]
max_context_tokens = 1000000
heartbeat_file = "/var/run/claude/claude-heartbeat"
relaunch_script = "/var/run/claude/claude-relaunch.sh"

[dead_process]
checks_required = 3
restart_cooldown = 300
# Cycles of confirmed idle+0-tokens before injecting the fresh-session resume
# prompt. At check_interval=5s this is the inject latency floor. The code
# default is 5 (~50-60s) to avoid kicking a host session that's only briefly
# between turns. In the container a recreate is known-fresh, so 1 cycle
# (~5s) is enough confirmation and cuts the post-recreate dead time. Combined
# with check_interval=5 above, the first inject attempt lands in <10s.
fresh_inject_checks = 1

[fresh_clear]
min_tokens = 2000
max_tokens = 5000
detections_required = 2
cooldown = 120

[heartbeat]
stale_minutes = 10

[queue_check]
# Enable in-tree stuck/orphaned queue-item detection events. The cron
# (container/cron.d/cw-default) runs `claude-watch queue-check` every 5
# min. With emit_events=false (the code default) it DETECTS qualifying
# items but stays silent (logs "emit_events is OFF"). Flip it on so
# orphaned (running, dead-PID) and stuck (wedged, or running with a stale
# last_heartbeat_at) items surface as queue-orphaned/queue-stuck
# claude-events. This is the in-container equivalent of the out-of-tree
# WorkQueueOrphaned/WorkQueueStuckSoft Prometheus alerts (no exporter or
# Prometheus runs in-container). Single-emit per (qid,condition), ledger
# at /var/lib/claude-watch/queue-check-state.json.
#
# Orphaned detection joins against the cron-written
# /var/lib/claude-watch/active-agents.json: a running item whose agent
# transcript went stale (died-after-spawn), or which has no agent record
# at all and was registered more than no_binding_grace_secs ago
# (never-spawned), is flagged orphaned. Workload/hostjob-scoped items are
# exempt (their liveness is a progress heartbeat, not an agent transcript).
emit_events = true
# Grace window (seconds) before a running item with no active-agent binding
# is flagged orphaned (never-spawned case). Default 150.
no_binding_grace_secs = 150

[alerts]
initial_cooldown = 600
escalation_tiers = [600, 600, 1800, 3600, 3600, 3600]
max_pingme_alerts = 6
resume_prompt = "[CLAUDE-WATCH] (in-container) Daemon detected stuck state."

[foreground_monitor]
enabled = true
# Raised 300 -> 480 (2026-06-11) to match the host root config.toml
# (line ~91, already 480 since 2026-05-30). 300 was clipping legit
# long agent-spawn composes / agent-return reads as prolonged thinking.
threshold_seconds = 480
check_interval = 3
interrupt_enabled = true
interrupt_message = "The foreground command was backgrounded by claude-watch because it exceeded the timeout. Use run_in_background for long commands."
thinking_backoff_multiplier = 3

[watcher_monitor]
# The in-container watcher (claude-event-watch) follows the fire-and-exit
# contract: blocks on inotifywait, prints pending events, and exits. The
# session respawns it on each exit (session-scoped run_in_background
# task). If the session fails to restart it, the daemon fires a
# [CLAUDE-WATCH] alert and the main loop re-runs it via watcher-ctl.
# The cw-watcher-health-check cron (stale-event detection) remains as
# an additional safety net.
enabled = true
# Baked in-container watcher list. Format documented in the file.
# Currently registers: claude-event-watch (fire-and-exit event watcher).
watchers_config = "/opt/claude-container/watchmen/watchers.conf"
watchers_config_extra = "/home/hndrewaall/.config/claude-container/watchers/watchers.conf"
# Used only for the legacy host-side `bin/watchmen` daemon count.
# Zero in container -- no host-side watchmen daemon runs here.
expected_watchmen = 0
# Match the in-container watcher's name so the consumer-self-feedback
# guard in policy.rs fires when claude-event-watch itself is down.
event_consumer_watcher_name = "claude-event-watch"
# KNOB #1 (#429) — grace before WATCHER(S) DOWN inject, mirrored from the
# host root config.toml. WITHOUT these keys the daemon falls back to the
# src/config.rs serde defaults (inject_threshold=6 ~30s, event_threshold=3),
# which are far too eager for the in-container block-print-exit watcher: the
# normal exit->restart gap trips down-detection and the daemon nags the main
# loop with WATCHER(S) DOWN injects every inject_cooldown. #429 raised these
# in the host config + the serde defaults only to 6 — the container config
# (baked to /etc/claude-watch/config.toml) was never updated, so the
# headline-#429 grace never reached the deployed daemon. These values match
# config.toml ::[watcher_monitor].
#
# inject_threshold: consecutive missing checks (check_interval=5s) before the
# loud tmux-inject fires. 18 ~= 90s sustained-down before the first nag.
inject_threshold = 18
# event_threshold: consecutive missing before the QUIET claude-event path
# fires. Below inject_threshold so the quiet path strictly precedes the loud
# one. 12 ~= 60s.
event_threshold = 12
# event_grace_secs: after a quiet event has fired, suppress re-escalation for
# this window (give the main loop a chance to restart).
event_grace_secs = 60
# grace_secs: window after a watcher's last_seen_running during which a fresh
# miss is NOT counted as down (absorbs the normal block-print-exit read+restart
# cycle). 180s.
grace_secs = 180
# health_grace_secs: governs the watcher-status --unhealthy-only predicate the
# obligations health gate consults; 180 matches grace_secs so the gate doesn't
# fire on the normal restart cycle.
health_grace_secs = 180
# inject_cooldown: seconds between successive loud watcher-down injects (in-pane
# RE-FIRE throttle, NOT initial detection latency). 300 = one nag per 5 min max.
inject_cooldown = 300

[context_monitor]
enabled = true
threshold_margin = 100000
threshold_percent = 75
compact_trigger_percent = 5
grace_period = 300
cooldown = 300

[auto_update]
# Enabled. The original "host integration / Phase 2+" disable was a
# carry-over from the reauth/hybrid block below (those DO need host hooks);
# auto_update's update sequence is entirely in-container tmux work
# (interrupt -> /exit -> relaunch `claude` -> resume), no host dependency.
# The real reason it'd misbehave was the npm-global version-detection bug:
# get_version_info() only understood the native versioned-symlink layout, so
# in this `installMethod: global` container both installed+running resolved to
# None and check_auto_update() bailed before ever nudging. With that fixed
# (status.rs resolve_installed_version/resolve_running_version now handle the
# npm-global layout via package.json + ~/.claude/sessions/<PID>.json), the
# running-behind-on-disk case (e.g. running 2.1.175 while 2.1.178 is already
# installed) is detected and the restart nudge fires. The relaunch picks up
# the new build because npm already atomically swapped the package symlink.
enabled = true
# CONTAINER relaunch path: relaunch via cwsr's clean `tmux respawn-pane -k`
# instead of the interactive `/exit` + shell-inject flow. `/exit` is UNRELIABLE
# in the container — Claude Code 2.1.x pops a "Background work is running"
# confirmation whenever background watchers are running (always, here), and the
# shell-injected `bash <relaunch_script>` one-liner is fragile (tmpfs-wiped
# script, dangling ~/.local/bin/claude launcher during the `claude install`
# download window). Those failures cascaded into "Claude Code crashed —
# auto-restarting" alert storms + eventual container recreates (operator botchat
# #2107). cwsr respawns pane 0 directly (no /exit, no dialog, no raw-shell
# inject) and rebuilds the correct claude argv from the entrypoint env vars.
# Empty on the HOST / GB deployment (the daemon default), so that proven
# `/exit` relaunch flow is untouched there.
relaunch_command = ["cwsr", "--no-upgrade"]

[reauth]
# Disabled — host push-notification integration. Phase 2+ work item.
enabled = false

[task_watch]
# Disabled — no in-container `tasks` session yet.
enabled = false

[suppression]
max_consecutive_suppressions = 3
max_suppression_window_secs = 600

[api_retry]
enabled = true
consecutive = 1
max_stuck_secs = 1800

[hybrid]
# Disabled — host integration (SessionStart/Stop/PreCompact hooks fire
# `claude-watch hook-fire` from the host's settings.json; inside the
# container the in-container claude inherits those hooks via the
# ~/.claude bind mount but the binary path resolution happens against
# the in-container PATH, where /usr/local/bin/claude-watch now lives
# (Phase 1b). Keep the daemon-side hybrid OFF until we audit the
# in-container hook-fire path end-to-end in Phase 2.
enabled = false

[auto_respawn_on_hang]
# Default OFF — auto-killing the inner claude is destructive even inside
# the container. Operators flip `enabled = true` here (or via SIGHUP +
# config reload) when they want claude-watch to roll a wedged pane on
# its own. Even when disabled, the override below is the right shape
# for whenever operators DO opt in: respawn must invoke `cwsr` (in-
# container, rolls pane 0 via `tmux respawn-pane -k`) instead of the
# host-side `dashboard --detach` script (which doesn't exist inside the
# container — calling it would fall straight through to LaunchFailed).
enabled = false
respawn_command = ["cwsr", "--no-upgrade"]
