# claude-watch [watcher_monitor] watcher list -- baked in-container.
#
# Format (pipe-separated):
#   name|pattern|min_count|enabled|start_cmd[|on_restart_cmd]
#
# The claude-watch daemon's watcher_monitor reads this file when
# [watcher_monitor].enabled = true. For each enabled entry it:
#   - Runs `pgrep -fc -- <pattern>` to count matching processes.
#   - If count < min_count for several consecutive checks, fires a
#     `[CLAUDE-WATCH] WATCHER(S) DOWN: <name>` alert via tmux-inject
#     into the main loop's pane.
#   - Suggests `watcher-ctl run <name>` as the restart command, which
#     translates to running the entry's start_cmd in the main loop's
#     process tree (cardinal rule -- watchers spawn only from the
#     main loop).
#
# In the cw container, watchers are session-scoped run_in_background
# tasks (block-print-exit contract): the in-container session launches
# each watcher under /opt/claude-container/watchers/*.toml via the
# /claude-container:start-watchers skill and restarts it on each exit.
# This file is the daemon's FALLBACK alert layer: if the session fails
# to restart a watcher (or the watcher's pattern is missing from
# `pgrep`), the daemon fires the alert and the main loop re-runs the
# watcher.
#
# The pattern matches the launcher script's argv as seen by pgrep
# (the session spawns `bash /opt/claude-container/watchers/<name>.sh`).
# We anchor on the absolute path so a coincidental shell name match
# doesn't false-positive.

# claude-event-watch: blocks until a claude-event arrives in
# ~/claude-events/, prints pending events, and exits. Follows the
# fire-and-exit contract so the main loop gets notified on each batch.
# Restarted by the session on each exit (restart_policy=session);
# should NEVER be missing. min_count=1.
claude-event-watch|/opt/claude-container/watchers/claude-event-watch.sh|1|true|/opt/claude-container/watchers/claude-event-watch.sh
