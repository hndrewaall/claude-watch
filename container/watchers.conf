# claude-watch [watcher_monitor] watcher list -- baked in-container.
#
# Format (pipe-separated):
#   name|pattern|min_count|enabled|start_cmd[|on_restart_cmd]
#
# The claude-watch daemon's watcher_monitor reads this file when
# [watcher_monitor].enabled = true. For each enabled entry it:
#   - Runs `pgrep -fc -- <pattern>` to count matching processes.
#   - If count < min_count for several consecutive checks, fires a
#     `[CLAUDE-WATCH] WATCHER(S) DOWN: <name>` alert via tmux-inject
#     into the main loop's pane.
#   - Suggests `watcher-ctl run <name>` as the restart command, which
#     translates to running the entry's start_cmd in the main loop's
#     process tree (cardinal rule -- watchers spawn only from the
#     main loop).
#
# In the cw container, the cw-watcher-supervisor (entrypoint-spawned)
# is the PRIMARY restart mechanism -- it respawns each watcher under
# /etc/claude-code/watchers/*.toml per restart_policy. This file is
# the daemon's FALLBACK alert layer: if the supervisor itself is
# wedged (e.g. crash-loop -> stuck), or the watcher's pattern is
# missing from `pgrep`, the daemon fires the alert and the main loop
# re-runs the watcher.
#
# The pattern matches the launcher script's argv as seen by pgrep
# (the supervisor spawns `bash /etc/claude-code/watchers/<name>.sh`).
# We anchor on the absolute path so a coincidental shell name match
# (e.g. a user running `claude-event-tail` from a stale terminal)
# doesn't false-positive.

# claude-event-tail: tails ~/claude-events/*.json and surfaces each
# event to the in-container session via stdout. Mirrors the host's
# claude-event-watch. Long-lived (restart_policy=always under the
# supervisor); should NEVER be missing. min_count=1.
claude-event-tail|/etc/claude-code/watchers/claude-event-tail.sh|1|true|/etc/claude-code/watchers/claude-event-tail.sh
